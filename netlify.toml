# ═══════════════════════════════════════════════════════════════
# فضاء الطباعة الرقمية — Netlify Configuration
# ═══════════════════════════════════════════════════════════════

[build]
  command = "npm run build"
  publish = ".next"

# Next.js runtime plugin for Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# API functions configuration
[functions]
  # Increase function timeout (max 10s on free plan, 26s on Pro)
  node_bundler = "esbuild"

# Specific function configuration for file uploads
# This gives upload-file more time to process
[functions."api-upload-file"]
  maxDuration = 26

# Environment variables (set these in Netlify dashboard instead)
# These are just reminders — actual values should be set in Netlify UI
# [context.production.environment]
#   GOOGLE_SCRIPT_URL = "your-gas-url"
#   SHEET_SECRET_TOKEN = "your-token"

# Headers for API routes
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
